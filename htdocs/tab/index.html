<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>タブパーツ</title>
	<script src="./src/index.ts" type="module" defer></script>
</head>
<body>
	<div class="container">
		<section class="section">
			<h1 class="title">タブ</h1>

			<div id="tabApp01">
				<div role="tablist">
					<button
						type="button"
						role="tab"
						id="tab1"
						aria-controls="tabpanel1">
						タブ1
					</button>
					<button
						type="button"
						role="tab"
						id="tab2"
						aria-controls="tabpanel2">
						タブ2
					</button>
					<button
						type="button"
						role="tab"
						id="tab3"
						aria-controls="tabpanel3">
						タブ3
					</button>
					<button
						type="button"
						role="tab"
						id="tab4"
						aria-controls="tabpanel4">
						タブ4
					</button>
				</div>
				<div
					role="tabpanel"
					id="tabpanel1"
					aria-labelledby="tab1">
					タブパネル1
				</div>
				<div
					role="tabpanel"
					id="tabpanel2"
					aria-labelledby="tab2">
					タブパネル2
				</div>
				<div
					role="tabpanel"
					id="tabpanel3"
					aria-labelledby="tab3">
					タブパネル3
				</div>
				<div
					role="tabpanel"
					id="tabpanel4"
					aria-labelledby="tab4">
					タブパネル4
				</div>
			</div>
		</section>
		<div class="has-text-centered">
			<a class="button" href="/">トップページへ</a>
		</div>
	</div>
</body>
</html>
